site_name: MCAB Docs
site_description: MCAB Tutorial & Documentation
site_url: https://sslastochkin.github.io/mcab/

nav:
  - 'Home': README.md
  - 'Tutorial': 
    - 'First steps': 'tutorial/01_first_steps.md'
    - 'Data and Effects': 'tutorial/02_data_and_effects.md'
    - 'Variance Reduction': 'tutorial/03_variance_reduction.md'
    - 'Multiple Corrections': 'tutorial/04_multiple_corrections.md'
  - User Guide:
      - 'Overview': 'guide/00_index.md'
      - '1. Why Monte Carlo Over Formulas': 'guide/01_why_monte_carlo.md'
      - '2. Loading Your Own Data': 'guide/02_load_your_data.md'
      - '3. Type I Error and Choosing a Test': 'guide/03_type_one_error.md'
      - '4. Reproducibility and Seeds': 'guide/04_reproducibility_seeds.md'
      - '5. Injecting the Effect': 'guide/05_effect_injection.md'
      - '6. Power, MDE and Sample Size': 'guide/06_power_mde_n.md'
      - '7. Non-Randomized (Constructed) Controls': 'guide/07_non_randomized.md'
      - '8. Power Boosting Methods': 'guide/08_power_boosting.md'
      - '9. Comparing Setups and Picking the Best': 'guide/09_compare_setups.md'
      - '10. Multiple Testing': 'guide/10_multiple_testing.md'
      - '11. Empirical Tests': 'guide/11_empirical_tests.md'
      - '12. End-to-End Recipes': 'guide/12_recipes.md'
  - 'Api':
    - 'Overview': 'api/index.md'
    - 'core.py': 'api/core.md'
    - 'effects.py': 'api/effects.md'
    - 'mstats.py': 'api/mstats.md'
    - 'plots.py': 'api/plots.md'
    - 'transform.py': 'api/transform.md'
    - 'utils.py': 'api/utils.md'

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  font:
    text: Roboto
    code: Roboto Mono

repo_url: https://github.com/sslastochkin/mcab
repo_name: mcab

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.smartsymbols
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - abbr
  - toc:
      permalink: true
      toc_depth: "1-6"
      
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: en
  - minify:
      minify_html: true
  - mkdocs-jupyter:
      include_source: true
      ignore_h1_titles: true
      execute: false
  - mkdocstrings:
      handlers:
        python:
          paths: [src] # code path (src/mcab)
          options:
            docstring_style: numpy # google / numpy / sphinx
            show_source: true
            show_root_heading: true
            merge_init_into_class: true
