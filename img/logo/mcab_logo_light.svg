<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 155" width="480" height="155">
  <!--
    MCAB light logo — matplotlib classic palette
    Left bell  : #1f77b4 (matplotlib blue,   Group A)
    Right bell : #ff7f0e (matplotlib orange,  Group B)
    Text       : #111111 (near-black)
    Background : #ffffff
  -->
  <defs>
    <!-- subtle drop-shadow under curves -->
    <filter id="shadowA" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1f77b4" flood-opacity="0.18"/>
    </filter>
    <filter id="shadowB" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#ff7f0e" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="480" height="155" fill="#ffffff"/>

  <!-- ── Ambient soft blobs ── -->
  <circle cx="57"  cy="55" r="42" fill="#1f77b4" fill-opacity="0.06"/>
  <circle cx="105" cy="55" r="42" fill="#ff7f0e" fill-opacity="0.07"/>

  <!-- ── Filled areas ── -->
  <path d="M 12,134 C 26,134 44,24 57,22 C 70,20 88,134 102,134 Z"
        fill="#1f77b4" fill-opacity="0.12"/>
  <path d="M 60,134 C 74,134 92,24 105,22 C 118,20 136,134 150,134 Z"
        fill="#ff7f0e" fill-opacity="0.12"/>
  <!-- overlap blend -->
  <path d="M 60,134 C 68,134 75,80 81,68 C 87,80 94,134 102,134 Z"
        fill="#888888" fill-opacity="0.06"/>

  <!-- ── Baseline ── -->
  <line x1="12" y1="134" x2="150" y2="134"
        stroke="#c8cedf" stroke-width="1.2"/>

  <!-- ── Bell strokes ── -->
  <path d="M 12,134 C 26,134 44,24 57,22 C 70,20 88,134 102,134"
        fill="none" stroke="#1f77b4" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#shadowA)"/>
  <path d="M 60,134 C 74,134 92,24 105,22 C 118,20 136,134 150,134"
        fill="none" stroke="#ff7f0e" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round"
        filter="url(#shadowB)"/>

  <!-- ── Peak dots ── -->
  <circle cx="57"  cy="22" r="4" fill="#1f77b4"/>
  <circle cx="105" cy="22" r="4" fill="#ff7f0e"/>

  <!-- ── Wordmark ── -->
  <text x="174" y="105"
        font-family="'Inter','Helvetica Neue','Arial',sans-serif"
        font-size="80" font-weight="900" letter-spacing="-3"
        fill="#111111">
    MCAB
  </text>

  <!-- ── Separator ── -->
  <line x1="176" y1="115" x2="464" y2="115"
        stroke="#d0d4e4" stroke-width="0.8"/>

  <!-- ── Tagline ── -->
  <text x="177" y="134"
        font-family="'Inter','Helvetica Neue','Arial',sans-serif"
        font-size="12.5" font-weight="400" letter-spacing="3.8"
        fill="#6b7280">
    MONTE CARLO · A/B TESTING
  </text>

</svg>
