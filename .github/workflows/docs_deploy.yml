name: Documentation Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'src/**'
      - '.github/workflows/docs_deploy.yml'
      - 'mkdocs_requirements.txt'
      - 'mkdocs.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install -r mkdocs_requirements.txt

      - name: Convert ipynb
        run: |
          for dir in tutorial guide; do
            for nb in docs/$dir/*.ipynb; do
              jupyter nbconvert --to markdown "$nb" --output-dir "docs/$dir/"
            done
          done
          sed -i 's/\.ipynb/.md/g' mkdocs.yml

      - name: Build the site
        run: mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
